# Marketplace metadata (name/category/description) is published via
# `railway templates publish --description ...` flags, not stored here.
# README.md is the canonical marketplace overview — keep them in sync.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No healthcheckPath: open-webui's /health reflects uvicorn-bound, not
# alembic-/lifespan-ready, so on cold volumes Railway would mark deploys
# CRASHED in the first 60-120s. We rely on restartPolicyType=ON_FAILURE.
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# DATA_DIR is set in the Dockerfile (ENV DATA_DIR="/data") to avoid the
# historical pitfall where Railway's pinned-reference service-level mount
# at /data diverged from the app's actual write path (causing the sqlite
# db + WAL/SHM siblings to wipe every redeploy). The persistent volume
# below mounts at /data, matching the baked-in DATA_DIR.
[[deploy.volumeMounts]]
name = "open-webui-volume"
mountPath = "/data"
