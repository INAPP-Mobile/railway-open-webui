<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="315" r="200" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
  <circle cx="950" cy="315" r="140" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>

  <!-- Logo icon -->
  <circle cx="180" cy="315" r="70" fill="url(#accent)" opacity="0.95"/>
  <path d="M145 275 h70 a40 40 0 0 1 40 40 v20 a40 40 0 0 1 -40 40 h-20 l-30 40 v-40 h-40 a40 40 0 0 1 -40 -40 v-20 a40 40 0 0 1 40 -40 z"
        fill="#ffffff" opacity="0.95"/>

  <!-- Title -->
  <text x="300" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#ffffff">Open WebUI</text>

  <!-- Subtitle -->
  <text x="300" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Deploy on Railway in minutes</text>

  <!-- Tags -->
  <rect x="300" y="390" width="175" height="36" rx="18" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <text x="320" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#a5b4fc">AI Chat</text>

  <rect x="485" y="390" width="175" height="36" rx="18" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="505" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#c4b5fd">Open Source</text>

  <rect x="670" y="390" width="175" height="36" rx="18" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="690" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ddd6fe">Self-Hosted</text>

  <!-- Railway branding -->
  <text x="1100" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#475569" text-anchor="end">Powered by Railway</text>
</svg>
